<template
	tag-name="editor-user-preference-modal"
	lyte-comp="true">
	<lyte-modal
		lt-prop-aria="true"
		lt-prop-show="{{lbind(ltPropShow)}}"
		lt-prop-overlay-close="true"
		lt-prop-close-on-escape="true"
		lt-prop-allow-multiple="true"
		lt-prop='{ "transition": { "animation": "fadeIn" } }'
		lt-prop-wrapper-class="clsc-modal-base clsc-modal-w-40 clsc-modal-h-60 clsc-modal-center">
		<template
			is="registerYield"
			yield-name="modal">
			<div class="pref-modal h-full flex-col">
				<!-- Header -->
				<div class="pref-modal__header flex items-center">
					<span class="material-symbols-outlined color-primary">tune</span>
					<h1 class="no-margin font-semibold color-primary">Settings</h1>
				</div>

				<!-- Tabs + Content -->
				<div class="pref-modal__body flex grow min-h-0">
					<!-- Vertical Tab Bar -->
					<div class="pref-modal__tabs flex-col gap-1">
						<button
							class="pref-modal__tab {{if(activeSettingsTab == 'preferences', 'pref-modal__tab--active', '')}}"
							onclick="{{action('onSettingsTabSelect', 'preferences')}}">
							<span class="material-symbols-outlined">toggle_on</span>
						</button>
						<button
							class="pref-modal__tab {{if(activeSettingsTab == 'shortcuts', 'pref-modal__tab--active', '')}}"
							onclick="{{action('onSettingsTabSelect', 'shortcuts')}}">
							<span class="material-symbols-outlined">keyboard</span>
						</button>
						<button
							class="pref-modal__tab {{if(activeSettingsTab == 'data', 'pref-modal__tab--active', '')}}"
							onclick="{{action('onSettingsTabSelect', 'data')}}">
							<span class="material-symbols-outlined">database</span>
						</button>
						<button
							class="pref-modal__tab"
							onclick="{{action('onAboutClick')}}">
							<span class="material-symbols-outlined">info</span>
						</button>
					</div>

					<!-- Tab Content -->
					<div class="pref-modal__content grow min-w-0">
						<template lyte-switch="{{activeSettingsTab}}">
							<!-- Tab 1: Preferences (App + Editor) -->
							<template
								lyte-case="preferences"
								lyte-break>
								<div class="flex-col gap-5 text-l">
									<!-- App Preferences -->
									<div class="flex-col gap-2">
										<h4
											class="flex items-center gap-0.75 no-margin text-l font-semibold color-primary uppercase tracking-wider">
											<span class="material-symbols-outlined text-l">devices</span>
											<span>App Preferences</span>
										</h4>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Theme
											</label>
											<clsc-multi-toggle-switch
												name="theme"
												selected="{{lbind(selectedTheme)}}"
												options="{{themeOptions}}"></clsc-multi-toggle-switch>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Editor Tree Position
											</label>
											<clsc-multi-toggle-switch
												name="treePosition"
												selected="{{lbind(selectedTreePosition)}}"
												options="{{treePositionOptions}}"></clsc-multi-toggle-switch>
										</div>
									</div>

									<!-- Editor Preferences -->
									<div class="flex-col gap-2">
										<h4
											class="flex items-center gap-0.75 no-margin text-l font-semibold color-primary uppercase tracking-wider">
											<span class="material-symbols-outlined text-l font-extrabold">code</span>
											<span>Editor Preferences</span>
										</h4>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Word Wrap
											</label>
											<clsc-toggle-switch checked="{{lbind(wordWrap)}}"></clsc-toggle-switch>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Sticky Scroll
											</label>
											<clsc-toggle-switch checked="{{lbind(stickyScroll)}}"></clsc-toggle-switch>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Tab Size
											</label>
											<clsc-multi-toggle-switch
												name="tabSize"
												selected="{{lbind(selectedTabSize)}}"
												options="{{tabSizeOptions}}"></clsc-multi-toggle-switch>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Show Minimap
											</label>
											<clsc-toggle-switch checked="{{lbind(minimap)}}"></clsc-toggle-switch>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Show Line Numbers
											</label>
											<clsc-toggle-switch checked="{{lbind(lineNumbers)}}"></clsc-toggle-switch>
										</div>
									</div>
								</div>
							</template>

							<!-- Tab 2: Keyboard Shortcuts + Monaco Shortcuts -->
							<template
								lyte-case="shortcuts"
								lyte-break>
								<div class="flex-col gap-5 text-l">
									<!-- Keyboard Shortcuts -->
									<div class="flex-col gap-2">
										<h4
											class="flex items-center gap-0.75 no-margin text-l font-semibold color-primary uppercase tracking-wider">
											<span class="material-symbols-outlined text-l">keyboard</span>
											<span>Keyboard Shortcuts</span>
										</h4>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												New File
											</label>
											<kbd class="pref-kbd">{{if(isMac, '⌃ ⇧ N', 'Ctrl + Shift + N')}}</kbd>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												New Comparator File
											</label>
											<kbd class="pref-kbd">{{if(isMac, '⌃ ⇧ M', 'Ctrl + Shift + M')}}</kbd>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Import Files
											</label>
											<kbd class="pref-kbd">{{if(isMac, '⌃ ⇧ O', 'Ctrl + Shift + O')}}</kbd>
										</div>
										<div class="flex items-center justify-between gap-0.75">
											<label class="text-m color-sec-text tracking-wide">
												<span class="color-primary">✦</span>
												Reopen Archived File
											</label>
											<kbd class="pref-kbd">{{if(isMac, '⌃ ⇧ T', 'Ctrl + Shift + T')}}</kbd>
										</div>
									</div>

									<!-- Monaco Editor Shortcuts -->
									<div class="flex-col gap-2">
										<h4
											class="flex items-center gap-0.75 no-margin text-l font-semibold color-primary uppercase tracking-wider">
											<span class="material-symbols-outlined text-l">code</span>
											<span>Monaco Editor Shortcuts</span>
										</h4>

										<!-- Command Palette & Navigation -->
										<div class="flex-col gap-1.5 pref-shortcut-group">
											<h5
												class="no-margin text-s color-sec-text font-semibold uppercase tracking-wider">
												Command Palette & Navigation
											</h5>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Command Palette
												</label>
												<kbd class="pref-kbd">F1</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Go to Line
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌃ G', 'Ctrl + G')}}</kbd>
											</div>
										</div>

										<!-- Find & Replace -->
										<div class="flex-col gap-1.5 pref-shortcut-group">
											<h5
												class="no-margin text-s color-sec-text font-semibold uppercase tracking-wider">
												Find & Replace
											</h5>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Find
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌘ F', 'Ctrl + F')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Find and Replace
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌥ ⌘ F', 'Ctrl + H')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Add Next Occurrence
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌘ D', 'Ctrl + D')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Select All Occurrences
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⇧ ⌘ L', 'Ctrl + Shift + L')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Find Next / Previous
												</label>
												<kbd class="pref-kbd">F3 / ⇧ F3</kbd>
											</div>
										</div>

										<!-- Editing -->
										<div class="flex-col gap-1.5 pref-shortcut-group">
											<h5
												class="no-margin text-s color-sec-text font-semibold uppercase tracking-wider">
												Editing
											</h5>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Delete Line
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⇧ ⌘ K', 'Ctrl + Shift + K')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Move Line Up / Down
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⌥ ↑ / ⌥ ↓', 'Alt + ↑ / Alt + ↓')}}
												</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Copy Line Up / Down
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⇧ ⌥ ↑ / ⇧ ⌥ ↓', 'Shift + Alt + ↑ / Shift + Alt + ↓')}}
												</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Insert Line Below
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌘ Enter', 'Ctrl + Enter')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Insert Line Above
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⇧ ⌘ Enter', 'Ctrl + Shift + Enter')}}
												</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Indent / Outdent
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⌘ ] / ⌘ [', 'Ctrl + ] / Ctrl + [')}}
												</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Toggle Line Comment
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌘ /', 'Ctrl + /')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Toggle Block Comment
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⇧ ⌥ A', 'Shift + Alt + A')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Jump to Matching Bracket
												</label>
												<template lyte-if="{{isMac}}">
													<kbd class="pref-kbd">⇧ ⌘ \</kbd>
												</template>
												<template lyte-if="{{!isMac}}">
													<kbd class="pref-kbd">Ctrl + Shift + \</kbd>
												</template>
											</div>
										</div>

										<!-- Multi-Cursor -->
										<div class="flex-col gap-1.5 pref-shortcut-group">
											<h5
												class="no-margin text-s color-sec-text font-semibold uppercase tracking-wider">
												Multi-Cursor
											</h5>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Add Cursor
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌥ Click', 'Alt + Click')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Add Cursor Above / Below
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⌥ ⌘ ↑ / ⌥ ⌘ ↓', 'Ctrl + Alt + ↑ / Ctrl + Alt + ↓')}}
												</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Undo Last Cursor
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌘ U', 'Ctrl + U')}}</kbd>
											</div>
										</div>

										<!-- Selection -->
										<div class="flex-col gap-1.5 pref-shortcut-group">
											<h5
												class="no-margin text-s color-sec-text font-semibold uppercase tracking-wider">
												Selection
											</h5>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Select Current Line
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌘ L', 'Ctrl + L')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Expand / Shrink Selection
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⌃ ⇧ ⌘ → / ⌃ ⇧ ⌘ ←', 'Shift + Alt + → / Shift + Alt +
													←')}}
												</kbd>
											</div>
										</div>

										<!-- Folding -->
										<div class="flex-col gap-1.5 pref-shortcut-group">
											<h5
												class="no-margin text-s color-sec-text font-semibold uppercase tracking-wider">
												Folding
											</h5>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Fold Region
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌥ ⌘ [', 'Ctrl + Shift + [')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Unfold Region
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌥ ⌘ ]', 'Ctrl + Shift + ]')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Fold All
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⌘ K ⌘ 0', 'Ctrl + K Ctrl + 0')}}
												</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Unfold All
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⌘ K ⌘ J', 'Ctrl + K Ctrl + J')}}
												</kbd>
											</div>
										</div>

										<!-- Other -->
										<div class="flex-col gap-1.5 pref-shortcut-group">
											<h5
												class="no-margin text-s color-sec-text font-semibold uppercase tracking-wider">
												Other
											</h5>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Undo / Redo
												</label>
												<kbd class="pref-kbd">
													{{if(isMac, '⌘ Z / ⇧ ⌘ Z', 'Ctrl + Z / Ctrl + Shift + Z')}}
												</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Trigger Suggest
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌃ Space', 'Ctrl + Space')}}</kbd>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Toggle Word Wrap
												</label>
												<kbd class="pref-kbd">{{if(isMac, '⌥ Z', 'Alt + Z')}}</kbd>
											</div>
										</div>
									</div>
								</div>
							</template>

							<!-- Tab 3: Data Management -->
							<template
								lyte-case="data"
								lyte-break>
								<div class="flex-col gap-5 text-l">
									<div class="flex-col gap-2">
										<h4
											class="flex items-center gap-0.75 no-margin text-l font-semibold color-primary uppercase tracking-wider">
											<span class="material-symbols-outlined text-l">folder_zip</span>
											<span>Data Management</span>
										</h4>

										<template lyte-if="{{files.length > 0}}">
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="color-primary">✦</span>
													Export All Files as ZIP
												</label>
												<button
													class="btn-primary h-4 pref-btn-export"
													onclick="{{action('onExportClick')}}">
													<span class="material-symbols-outlined text-m">download</span>
													<span>Export</span>
												</button>
											</div>
											<div class="flex items-center justify-between gap-0.75">
												<label class="text-m color-sec-text tracking-wide">
													<span class="text-negative">✦</span>
													Permanently Delete All Content
												</label>
												<button
													class="btn-danger h-4 pref-btn-clear-data"
													onclick="{{action('onClearDataClick')}}">
													<span>Clear Data</span>
												</button>
											</div>
										</template>

										<template lyte-if="{{files.length == 0}}">
											<div
												class="flex-col flex-center gap-1.5"
												style="padding: 24px 0; opacity: 0.5">
												<span
													class="material-symbols-outlined text-primary"
													style="font-size: 36px">
													folder_off
												</span>
												<span class="text-xs text-primary">No files to manage</span>
											</div>
										</template>
									</div>
								</div>
							</template>
						</template>
					</div>
				</div>
			</div>
		</template>
	</lyte-modal>

	<!-- Clear Data Confirmation Modal -->
	<lyte-modal
		lt-prop-aria="true"
		lt-prop-show="{{lbind(showClearDataModal)}}"
		lt-prop-overlay-close="true"
		lt-prop-close-on-escape="true"
		lt-prop-allow-multiple="true"
		lt-prop='{"transition": {"animation": "fadeIn"}}'
		lt-prop-wrapper-class="clsc-modal-base clsc-modal-center pref-clear-data-modal">
		<template
			is="registerYield"
			yield-name="modal">
			<div class="flex-col gap-3 text-center">
				<div class="flex-col items-center gap-1.5">
					<span
